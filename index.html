<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Stable Online Items Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #fef7fc, #eef2ff);
            color: #4c4c4c;
        }
        header {
            background: #ff69b4;
            color: white;
            padding: 20px 0;
        }
        .navbar {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 600;
            font-size: 1rem;
        }
        .navbar a:hover {
            text-decoration: underline;
        }
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: url('/img/starstable-bg.jpg') no-repeat center center/cover;
            color: white;
            box-shadow: inset 0 0 0 2000px rgba(0, 0, 0, 0.3);
        }
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        .hero p {
            font-size: 1.2rem;
        }
        .content {
            max-width: 1200px;
            margin: auto;
            padding: 30px;
        }
        .buttons-block {
            text-align: center;
            margin: 30px 0;
        }
        .custom-itemselect-btn {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 25px;
            margin: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        .custom-itemselect-btn:hover {
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            transform: scale(1.1);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
        }
        footer {
            background: #ff69b4;
            color: white;
            padding: 20px 0;
            text-align: center;
        }
        footer a {
            color: white;
            text-decoration: underline;
        }
        footer a:hover {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="navbar">
            <a href="/">Home</a>
            <a href="/starstable/services/">SSO Services</a>
            <a href="#">Items</a>
        </div>
    </header>

    <section class="hero">
        <h1>Welcome to the Star Stable Online Items Database</h1>
        <p>Your one-stop solution for finding all quest items, collectibles, and more in Star Stable Online!</p>
    </section>

    <div class="content">
        <h2>Explore Our Categories</h2>
        <div class="buttons-block">
            <button class="custom-itemselect-btn" onClick="showSSOitems2(helmets_list)">Helmets</button>
            <button class="custom-itemselect-btn" onClick="showSSOitems2(tops_list)">Tops</button>
            <button class="custom-itemselect-btn" onClick="showSSOitems2(gloves_list)">Gloves</button>
            <button class="custom-itemselect-btn" onClick="showSSOitems2(pants_list)">Pants</button>
            <button class="custom-itemselect-btn" onClick="showSSOitems2(shoes_list)">Shoes</button>
            <button class="custom-itemselect-btn" onClick="showSSOitems2(hairs_list)">Hair</button>
            <button class="custom-itemselect-btn" onClick="showSSOitems2(makeup_list)">Makeup</button>
            <button class="custom-itemselect-btn" onClick="showSSOitems2(bridles_list)">Bridles</button>
            <button class="custom-itemselect-btn" onClick="showSSOitems2(saddles_list)">Saddles</button>
            <button class="custom-itemselect-btn" onClick="showSSOitems2(saddlepads_list)">Saddle Pads</button>
            <button class="custom-itemselect-btn" onClick="showSSOitems2(bags_list)">Bags</button>
            <button class="custom-itemselect-btn" onClick="showSSOitems2(pets_list)">Pets</button>
            <button class="custom-itemselect-btn" onClick="showSSOitems2(other_list)">Other</button>
            <button class="custom-itemselect-btn" onClick="showSSOitems2(new_items_list)">New Items</button>
        </div>

    </div>

    <footer>
        <p>&copy; 2024 Star Stable Online Items Database. All rights reserved.</p>
        <p><a href="license.html">License</a></p>
    </footer>

    <script src="/vendor/jquery.min.js" type="text/javascript"></script>
    <script src="/vendor/bootstrap/js/bootstrap.min.js" type="text/javascript"></script>
</body>
</html>
