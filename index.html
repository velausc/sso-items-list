<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Stable Online Items Database</title>
    <link href="https://fonts.googleapis.com/css?family=Hind:300,400,500,600,700" rel="stylesheet" type="text/css">
    <link href="/vendor/simple-line-icons/simple-line-icons.min.css" rel="stylesheet" type="text/css" />
    <link href="/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
    <link href="/css/animate.css" rel="stylesheet">
    <link href="/vendor/swiper/css/swiper.min.css" rel="stylesheet" type="text/css" />
    <link href="/css/layout.min.css" rel="stylesheet" type="text/css" />
    <link rel="shortcut icon" href="/favicon.ico" />
</head>
<body>
    <header class="header">
        <nav class="navbar" role="navigation">
            <div class="container">
                <div class="menu-container">
                    <button type="button" class="navbar-toggle" data-toggle="collapse" data-target=".nav-collapse">
                        <span class="sr-only">Toggle navigation</span>
                        <span class="toggle-icon"></span>
                    </button>
                    <div class="navbar-logo">
                        <a class="navbar-logo-wrap">
                            <img class="navbar-logo-img" src="/img/logo.png" alt="Star Stable Online">
                        </a>
                    </div>
                </div>
                <div class="collapse navbar-collapse nav-collapse">
                    <ul class="navbar-nav navbar-nav-right">
                        <li class="nav-item"><a class="nav-item-child active" href="/">Home</a></li>
                        <li class="nav-item"><a class="nav-item-child" href="/starstable/services/">SSO Services</a></li>
                        <li class="nav-item"><a class="nav-item-child">Other</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <div class="bg-color-darkmain">
        <div class="content-md container">
            <h3 class="color-white margin-b-5">Item list for Star Stable Online</h3>
            <p class="color-white margin-b-0">This list contains quest items, hairstyles, skins, collectibles, character items, and horse items. All items are selectable by clicking on them.</p>
            <div class='buttons-block'>
                <button class="custom-itemselect-btn" onClick="showSSOitems2(pets_list)">Pets</button>
                <button class="custom-itemselect-btn" onClick="showSSOitems2(hairs_list)">Hairstyles</button>
                <button class="custom-itemselect-btn" onClick="showSSOitems2(tops_list)">Tops</button>
                <button class="custom-itemselect-btn" onClick="showSSOitems2(maps_list)">Masks</button>
                <button class="custom-itemselect-btn" onClick="showSSOitems2(hats_list)">Hats</button>
                <button class="custom-itemselect-btn" onClick="showSSOitems2(pants_list)">Pants</button>
                <button class="custom-itemselect-btn" onClick="showSSOitems(14000,14376)">New</button>
                <button class="custom-itemselect-btn" onClick="showSSOitems(1,1000)">1-1000</button>
                <button class="custom-itemselect-btn" onClick="showSSOitems(1001,2000)">1001-2000</button>
                <button class="custom-itemselect-btn" onClick="showSSOitems(2001,3000)">2001-3000</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="content-md container">
            <div class="row">
                <div class="col-sm-2 sm-margin-b-30">
                    <ul class="list-unstyled footer-list">
                        <li class="footer-list-item"><a href="/">Home</a></li>
                    </ul>
                </div>
                <div class="col-sm-3">
                    <ul class="list-unstyled footer-list">
                        <li class="footer-list-item"><a href="#">Global price list</a></li>
                        <li class="footer-list-item"><a href="#">Privacy Policy</a></li>
                        <li class="footer-list-item"><a href="#">Terms &amp; Conditions</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>

    <a href="javascript:void(0);" class="js-back-to-top back-to-top">Top</a>

    <script src="/vendor/jquery.min.js" type="text/javascript"></script>
    <script src="/vendor/bootstrap/js/bootstrap.min.js" type="text/javascript"></script>
    <script src="/js/layout.min.js" type="text/javascript"></script>
</body>
</html>
